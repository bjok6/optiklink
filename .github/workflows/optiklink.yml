name: 🎮 OptikLink-Keep

on:
  schedule:
    - cron: '0 1 */2 * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  keepalive:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: ⚙ 设置代理 (sing-box)
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:1080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:1080 https://api.ipify.org | sed 's/\([0-9]*\)\..*/\1/'

      - name: 🚀 运行保活脚本
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          PANEL_ACCOUNT: ${{ secrets.PANEL_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          set -euo pipefail
          if [ -n "${NODE_LINK:-}" ]; then
            export GOST_PROXY="socks5://127.0.0.1:1080"
            echo "使用本地 SOCKS 代理"
          else
            export GOST_PROXY=""
            echo "直连"
          fi
          npx playwright test

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7

                # ========== 防止 60 天无活动禁用 workflow ==========
      - name: 📅 更新 time.txt 保持仓库活跃
        if: always()
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > time.txt
          echo "# 此文件由 GitHub Actions 自动更新，用于防止仓库 60 天无活动导致 scheduled workflow 被禁用" >> time.txt
          echo "# Auto-updated by GitHub Actions to prevent scheduled workflows from being disabled after 60 days of inactivity" >> time.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add time.txt
          # 只有内容变化时才 commit（避免空 commit）
          if git diff --staged --quiet; then
            echo "time.txt 无变化，跳过 commit"
          else
            git commit -m "chore: update time.txt to keep workflow alive [skip ci]"
            git push
            echo "✅ time.txt 已更新并推送"
          fi

      - name: 🧹 清理旧的运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
