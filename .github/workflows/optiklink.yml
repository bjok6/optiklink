name: 🎮 OptikLink-Keep

on:
  schedule:
    - cron: '0 1 */2 * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  keepalive:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npx playwright install chromium --with-deps

      - name: 🛡️ 启动 Hysteria2（整段链接）
        env:
          HY2_LINK: ${{ secrets.HY2_LINK }}
        run: |
          set -euo pipefail
          TAG=$(curl -sL https://api.github.com/repos/apernet/hysteria/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+' | head -1)
          wget -q -O hysteria "https://github.com/apernet/hysteria/releases/download/${TAG}/hysteria-linux-amd64"
          chmod +x hysteria

          LINK="${HY2_LINK#hysteria2://}"
          LINK="${LINK#hy2://}"
          AUTH="${LINK%%@*}"
          REST="${LINK#*@}"
          HOSTPORT="${REST%%[/?]*}"
          QUERY=""
          case "$REST" in *\?* ) QUERY="${REST#*\?}" ;; esac

          SNI=""; INSECURE="false"
          IFS='&' read -ra PAIRS <<< "$QUERY"
          for p in "${PAIRS[@]}"; do
            k="${p%%=*}"; v="${p#*=}"
            case "$k" in
              sni|peer) SNI="$v" ;;
              insecure) [ "$v" = "1" ] || [ "$v" = "true" ] && INSECURE="true" ;;
            esac
          done
          [ -z "$SNI" ] && SNI="${HOSTPORT%%:*}"
          AUTH=$(python3 -c "import urllib.parse,sys; print(urllib.parse.unquote(sys.argv[1]))" "$AUTH")

          cat > hy2-client.yaml <<EOF
          server: ${HOSTPORT}
          auth: ${AUTH}
          tls:
            sni: ${SNI}
            insecure: ${INSECURE}
          bandwidth:
            up: 50 mbps
            down: 100 mbps
          socks5:
            listen: 127.0.0.1:1080
          EOF
          sed -i 's/^[[:space:]]*//' hy2-client.yaml

          nohup ./hysteria client -c hy2-client.yaml > hy2.log 2>&1 &
          sleep 5
          cat hy2.log || true
          (echo >/dev/tcp/127.0.0.1/1080) 2>/dev/null || { echo "Hy2 failed"; exit 1; }

      - name: 🚀 运行保活脚本
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          PANEL_ACCOUNT:   ${{ secrets.PANEL_ACCOUNT }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY: ${{ secrets.HY2_LINK != '' && 'socks5://127.0.0.1:1080' || '' }}
        run: npx playwright test

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7
          
            # ========== 防止 60 天无活动禁用 workflow ==========
      - name: 📅 更新 time.txt 保持仓库活跃
        if: always()
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > time.txt
          echo "# 此文件由 GitHub Actions 自动更新，用于防止仓库 60 天无活动导致 scheduled workflow 被禁用" >> time.txt
          echo "# Auto-updated by GitHub Actions to prevent scheduled workflows from being disabled after 60 days of inactivity" >> time.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add time.txt
          # 只有内容变化时才 commit（避免空 commit）
          if git diff --staged --quiet; then
            echo "time.txt 无变化，跳过 commit"
          else
            git commit -m "chore: update time.txt to keep workflow alive [skip ci]"
            git push
            echo "✅ time.txt 已更新并推送"
          fi
          
      - name: 🧹 清理旧的运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
      
