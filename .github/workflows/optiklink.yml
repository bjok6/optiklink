name: 🎮 OptikLink-Keep

on:
  schedule:
    - cron: '0 1 */2 * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write   # time.txt git push 需要 write；原来 read 会 push 失败

jobs:
  keepalive:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: ⚙ 设置代理 (sing-box)
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_LINK:-}" ]; then
            echo "NODE_LINK 为空，跳过代理安装"
            exit 0
          fi
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

      - name: 🩺 等待并验证本地 SOCKS (127.0.0.1:1080)
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_LINK:-}" ]; then
            echo "无 NODE_LINK，跳过代理校验"
            echo "GOST_PROXY=" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "等待 127.0.0.1:1080 监听..."
          for i in $(seq 1 30); do
            if ss -lnt 2>/dev/null | grep -qE '[:.]1080\s'; then
              echo "端口 1080 已监听"
              break
            fi
            # 兼容没有 ss 的情况
            if (echo > /dev/tcp/127.0.0.1/1080) >/dev/null 2>&1; then
              echo "端口 1080 可连接"
              break
            fi
            sleep 2
            if [ "$i" -eq 30 ]; then
              echo "超时：1080 未就绪"
              ss -lntp || netstat -lntp || true
              exit 1
            fi
          done

          echo "探测代理出口 IP（socks5h = DNS 也走代理）..."
          EXIT_IP=$(curl -sS --max-time 25 --socks5-hostname 127.0.0.1:1080 https://api.ipify.org || true)
          if [ -z "$EXIT_IP" ]; then
            echo "代理探测失败：无法经 1080 访问外网"
            exit 1
          fi
          echo "代理出口 IP: $EXIT_IP"

          # 给后续 step + Playwright 使用（固定 IPv4，避免 localhost → ::1）
          echo "GOST_PROXY=socks5://127.0.0.1:1080" >> "$GITHUB_ENV"

      - name: 🚀 运行保活脚本
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          PANEL_ACCOUNT: ${{ secrets.PANEL_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          NODE_LINK: ${{ secrets.NODE_LINK }}
          # GOST_PROXY 来自上一 step 的 GITHUB_ENV
        run: |
          set -euo pipefail
          if [ -n "${GOST_PROXY:-}" ]; then
            echo "使用本地 SOCKS 代理: $GOST_PROXY"
          else
            echo "直连（无 GOST_PROXY）"
          fi
          npx playwright test

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7

      # ========== 防止 60 天无活动禁用 workflow ==========
      - name: 📅 更新 time.txt 保持仓库活跃
        if: always()
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > time.txt
          echo "# 此文件由 GitHub Actions 自动更新，用于防止仓库 60 天无活动导致 scheduled workflow 被禁用" >> time.txt
          echo "# Auto-updated by GitHub Actions to prevent scheduled workflows from being disabled after 60 days of inactivity" >> time.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add time.txt
          if git diff --staged --quiet; then
            echo "time.txt 无变化，跳过 commit"
          else
            git commit -m "chore: update time.txt to keep workflow alive [skip ci]"
            git push
            echo "✅ time.txt 已更新并推送"
          fi

      - name: 🧹 清理旧的运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
